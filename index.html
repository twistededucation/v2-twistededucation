  <script>
    // --- Render Bookmarks ---
    const bmGrid = document.getElementById('bookmarksGrid');
    if (typeof BOOKMARKS !== 'undefined') {
      BOOKMARKS.forEach(bm => {
        const a = document.createElement('a');
        a.href = bm.url; a.className = 'bookmark'; a.title = bm.name;
        a.innerHTML = `<div class="bookmark-icon"><img src="${bm.icon}" alt="${bm.name}"></div><span>${bm.name.toLowerCase()}</span>`;
        bmGrid.appendChild(a);
      });
    }

    // --- Force Refresh ---
    function setupForceRefresh() {
      const db = firebase.database();
      const SITE_VERSION = "1";

      db.ref('latestVersion').on('value', snapshot => {
        const latest = snapshot.val();
        if (latest && latest !== SITE_VERSION) location.reload(true);
      });

      db.ref('forceRefresh').on('value', snapshot => {
        if (snapshot.val() === true) location.reload(true);
      });
    }

    // --- Run After Window Loads ---
    window.onload = () => {
      startLoading();
      checkUsername();
      initFirebase();
      setupForceRefresh();
    };
  </script>
