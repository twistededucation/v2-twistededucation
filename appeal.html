<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study.com | Ban Appeal</title>
  <link rel="icon" href="https://cdn.jsdelivr.net/gh/nevapaid/twisted-assets/logo.png" type="image/png">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <style>
    /* Fancy input styles */
    #appealForm input,
    #appealForm textarea {
      width: 100%;
      padding: 12px 15px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #000000;
      font-size: 16px;
      transition: all 0.3s ease;
      background: #1a1a1a;
      color: #fff;
      resize: none;
    }
    #appealForm input:focus,
    #appealForm textarea:focus {
      border-color: #54ff9b;
      box-shadow: 0 0 25px 5px rgba(84, 255, 155, 0.7);
      outline: none;
      transform: scale(1.05);
    }
    #appealForm button {
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      background: #ffffff;
      color: #000;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    #appealForm button:hover {
      background: #3edc7a;
      transform: scale(1.05);
    }
    #feedback {
      margin-top: 10px;
      color: #b5b5b5;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <canvas id="starCanvas"></canvas>

<!-- Navbar toggle button -->
<button id="navbar-toggle">Navbar &#x25BC;</button> <!-- Down arrow added -->

<!-- Floating Navbar -->
<div id="floating-navbar">
  <button class="nav-btn" onclick="window.location.href='/index.html'">Home</button>
  <button class="nav-btn" onclick="window.location.href='/math/math.html'">Math</button>
  <button class="nav-btn" onclick="window.location.href='/public/suggestion.html'">Suggestion</button>
  <button class="nav-btn" onclick="window.location.href='/public/chat.html'">Chat</button>
  <button class="nav-btn" onclick="window.location.href='/public/settings.html'">Settings</button>
</div>

  <main class="main-content">
    <div class="page active" id="page-ban-appeal">
      <h1 class="home-title">Ban Appeal Form</h1>
      <p class="home-subtitle">Fill this out if you want to appeal your ban | Be honest or it will be denied</p>

      <form id="appealForm" style="max-width: 400px; margin: auto; text-align: center;">
        <input type="text" id="username" placeholder="Your Username (for reference)" required>
        <input type="text" id="banReason" placeholder="Ban Reason (optional)" >
        <textarea id="appealMessage" placeholder="Explain why you should be unbanned" required></textarea>
        <button type="submit">Submit Appeal</button>
        <p id="feedback"></p>
      </form>

      <div style="text-align: center; margin-top: 20px;">
        <a class="privacy-link" href="/dmca/privacy.html" style="color: #b5b5b5; text-decoration: none;" onmouseover="this.style.color='#54ff9b';" onmouseout="this.style.color='#b5b5b5';">Privacy Policy</a>
        &nbsp;&nbsp;
        <a class="terms-link" href="/dmca/tos.html" style="color: #b5b5b5; text-decoration: none;" onmouseover="this.style.color='#54ff9b';" onmouseout="this.style.color='#b5b5b5';">Terms of Service</a>
      </div>
    </div>
  </main>

  <script>

  const COOLDOWN = 10 * 60 * 1000; // 10 minutes in milliseconds
  const QUEUE_KEY = 'banAppealCooldown';

  async function sendAppeal(username, banReason, appealMessage) {
    const webhookURL = "https://discord.com/api/webhooks/1469783024257204386/UOd-DF6VbOQdRPFVQOoR9c1SmJLWLnx9LQwmzoY4hmng4kf3trDK5Eerww5s_Uge7i4u";

    const payload = {
      embeds: [{
        title: "New Ban Appeal",
        color: 0xff5555,
        fields: [
          { name: "Username", value: username },
          { name: "Ban Reason", value: banReason || "Not Provided" },
          { name: "Appeal Message", value: appealMessage }
        ],
        timestamp: new Date()
      }]
    };

    return fetch(webhookURL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
  }

  document.getElementById('appealForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const banReason = document.getElementById('banReason').value.trim();
    const appealMessage = document.getElementById('appealMessage').value.trim();
    const feedback = document.getElementById('feedback');

    if (!username || !appealMessage) return;

    const lastSent = parseInt(localStorage.getItem(QUEUE_KEY)) || 0;
    const now = Date.now();

    if (now - lastSent < COOLDOWN) {
      const remaining = Math.ceil((COOLDOWN - (now - lastSent)) / 1000);
      feedback.textContent = `⏳ Please wait ${remaining} seconds before sending another appeal.`;
      return;
    }

    feedback.textContent = "⏳ Sending your appeal...";

    try {
      await sendAppeal(username, banReason, appealMessage);
      feedback.textContent = "✅ Appeal submitted successfully!";
      document.getElementById('appealForm').reset();
      localStorage.setItem(QUEUE_KEY, Date.now());
    } catch (err) {
      feedback.textContent = "❌ Failed to send appeal.";
      console.error(err);
    }
  });

  </script>

  <script src="/js/firebase.js"></script>
  <script src="/js/navbar.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/loading.js"></script>
  <script src="/js/stars.js"></script>
  <script src="/js/theme-loader.js"></script>
</body>
</html>
