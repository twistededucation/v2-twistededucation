<body>
    <!-- Canvas for stars -->
    <canvas id="starCanvas"></canvas>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loading-center">
            <div id="click-counter">Clicks Today: 0</div>
            <img id="loading-image" src="https://cdn.jsdelivr.net/gh/nevapaid/twisted-assets/pusheen.png" alt="Loading" draggable="false">
            <div id="loading-text" class="main-message"></div>
            <div class="progress-wrapper">
                <div id="loading-bar-fill"></div>
            </div>
            <button id="skip-loading">Skip</button>
        </div>
    </div>

<!-- Navbar toggle button -->
<button id="navbar-toggle">Navbar &#x25BC;</button>

<!-- Floating Navbar -->
<div id="floating-navbar">
  <button class="nav-btn" onclick="window.location.href='/index.html'">Home</button>
  <button class="nav-btn" onclick="window.location.href='/math/math.html'">Math</button>
  <button class="nav-btn" onclick="window.location.href='/public/suggestion.html'">Suggestion</button>
  <button class="nav-btn" onclick="window.location.href='/public/chat.html'">Chat</button>
  <button class="nav-btn" onclick="window.location.href='/public/settings.html'">Settings</button>
</div>

    <!-- Main Content -->
    <main class="main-content">
        <div class="games-header">
            <div class="header-content">
                <div class="logo"> <span>games</span></div>
                <div class="search-container">
                    <input type="text" id="searchBar" placeholder="Search games..." oninput="filterZones()" />
                    <select id="sortOptions" onchange="sortZones()">
                        <option value="name">Name</option>
                        <option value="id">Newest</option>
                        <option value="popular">All-Time Popular</option>
                        <option value="trendingMonth">Trending (Month)</option>
                        <option value="trendingWeek">Trending (Week)</option>
                        <option value="trendingDay">Trending (Day)</option>
                    </select>
                    <select id="filterOptions" onchange="filterZones2()">
                        <option value="none">All Games</option>
                    </select>
                </div>
                <div class="control-buttons">
                    <button id="refresh" class="control-button" title="Refresh games" onclick="listZones()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                    </button>
                    <button id="settings" class="control-button" title="Settings">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                            <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Ad Scripts -->
        <script>
            (function () {
                const block = () => console.warn("Blocked");
                try {
                    Object.defineProperty(window, "location", {
                        configurable: false,
                        enumerable: true,
                        get() {
                            return {
                                assign: block,
                                replace: block,
                                reload: block,
                                href: window.location.href
                            };
                        },
                        set: block
                    });
                } catch (e) {}
                window.open = function () {
                    return null;
                };
                window.addEventListener("beforeunload", (e) => {
                    e.stopImmediatePropagation();
                }, true);
            })();
        </script>

        <script>
            atOptions = {
                'key' : 'f75eaf1bebd085497664ab9058a6017c',
                'format' : 'iframe',
                'height' : 90,
                'width' : 728,
                'params' : {}
            };
        </script>
        <script src="https://www.highperformanceformat.com/f75eaf1bebd085497664ab9058a6017c/invoke.js"></script>

        <details id="featuredZonesWrapper" open>
            <summary>Featured Games</summary>
            <div id="featuredZones" class="zone-container"></div>
        </details>

        <hr />

        <details id="allZonesWrapper" open>
            <summary id="allSummary">All Games</summary>
            <div id="container" class="zone-container">Loading...</div>
        </details>
    </main>

    <!-- Game Viewer -->
    <div id="zoneViewer">
        <div class="zone-header">
            <div class="zone-title">
                <h2 id="zoneName">Game</h2>
                <button class="info-button" onclick="showZoneInfo()" title="Game Information">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="16" x2="12" y2="12"></line>
                        <line x1="12" y1="8" x2="12.01" y2="8"></line>
                    </svg>
                </button>
                <span id="zoneId" style="display: none"></span>
                <a id="zoneAuthor" href="#" target="_blank">by Author</a>
            </div>
            <div class="zone-controls">
                <button onclick="fullscreenZone()">Fullscreen</button>
                <button onclick="aboutBlank()">New Tab</button>
                <button onclick="downloadZone()">Download</button>
                <button onclick="closeZone()">Close</button>
            </div>
        </div>
        <iframe id="zoneFrame"></iframe>
    </div>

    <!-- Popup -->
    <div id="popupOverlay">
        <div class="popup">
            <div class="popup-header">
                <h3 id="popupTitle">Title</h3>
                <button id="popupClose" onclick="closePopup()">×</button>
            </div>
            <div id="popupBody">Content will be here</div>
        </div>
    </div>

    <!-- Discord Link -->
    <a href="https://discord.gg/rKuch4azCU" target="_blank" class="discord-text">
        .gg/rKuch4azCU
    </a>

    <!-- Footer -->
    <footer>
        <div class="footer-links">
            <a href="#" onclick="loadDMCA(); return false">DMCA</a>
            <a href="#" onclick="showContact(); return false">Contact</a>
            <a href="#" onclick="loadPrivacy(); return false">Privacy</a>
            <a href="javascript:saveData()">Export</a>
            <a href="#" onclick="document.getElementById('importData').click(); return false">Import</a>
            <input type="file" id="importData" style="display: none" onchange="loadData(event)" />
        </div>
    </footer>

    <!-- Scripts -->
    <script src="/js/games.js"></script>
    <script src="/js/loading.js"></script>
    <script src="/js/stars.js"></script>
    <script src="/js/navbar.js"></script>
    
    <script>
        // Initialize
        window.onload = () => {
            if (typeof startLoading === 'function') startLoading();
        };
    </script>
