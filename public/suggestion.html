<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study.com | Suggestions</title>
<link rel="icon" href="https://cdn.jsdelivr.net/gh/nevapaid/twisted-assets/logo.png" type="image/png">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <style>
    /* Fancy input styles */
    #suggestionForm input,
    #suggestionForm textarea {
      width: 100%;
      padding: 12px 15px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #000000;
      font-size: 16px;
      transition: all 0.3s ease;
      background: #1a1a1a;
      color: #fff;
      resize: none;
    }
    #suggestionForm input:focus,
    #suggestionForm textarea:focus {
      border-color: #54ff9b;
      box-shadow: 0 0 25px 5px rgba(84, 255, 155, 0.7);
      outline: none;
      transform: scale(1.05);
    }
    #suggestionForm button {
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      background: #ffffff;
      color: #000;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    #suggestionForm button:hover {
      background: #3edc7a;
      transform: scale(1.05);
    }
    #feedback {
      margin-top: 10px;
      color: #b5b5b5;
      font-weight: bold;
    }
  </style>
</head>
<body>
<div id="loading-screen">
  <div class="loading-center">
    <div id="click-counter">Clicks Today: 0</div>
    <img id="loading-image" src="https://cdn.jsdelivr.net/gh/nevapaid/twisted-assets/pusheen.png" alt="Loading Image" draggable="false">
    <div id="loading-text" class="main-message"></div>
    <div class="progress-wrapper">
      <div id="loading-bar-fill"></div>
    </div>
    <button id="skip-loading">Skip</button>
  </div>
</div>
<!-- Navbar toggle button -->
<button id="navbar-toggle">Navbar &#x25BC;</button> <!-- Down arrow added -->

<!-- Floating Navbar -->
<div id="floating-navbar">
  <button class="nav-btn" onclick="window.location.href='/index.html'">Home</button>
  <button class="nav-btn" onclick="window.location.href='/math/math.html'">Math</button>
  <button class="nav-btn" onclick="window.location.href='/public/suggestion.html'">Suggestion</button>
  <button class="nav-btn" onclick="window.location.href='/public/chat.html'">Chat</button>
  <button class="nav-btn" onclick="window.location.href='/public/settings.html'">Settings</button>
</div>

  <main class="main-content">
    <div class="page active" id="page-suggestions">
      <h1 class="home-title">Send a Suggestion</h1>
      <p class="home-subtitle">We read all suggestions btw | any troll's will be banned btw</p>

      <form id="suggestionForm" style="max-width: 400px; margin: auto; text-align: center;">
        <input type="text" id="username" placeholder="Your Discord Username (for credits)" required>
        <textarea id="suggestion" placeholder="Your Suggestion (can be anything)" required></textarea>
        <button type="submit">Send Suggestion</button>
        <p id="feedback"></p>
      </form>

      <div style="text-align: center; margin-top: 20px;">
        <a class="privacy-link" href="/dmca/privacy.html" style="color: #b5b5b5; text-decoration: none;" onmouseover="this.style.color='#54ff9b';" onmouseout="this.style.color='#b5b5b5';">Privacy Policy</a>
        &nbsp;&nbsp;
        <a class="terms-link" href="/dmca/tos.html" style="color: #b5b5b5; text-decoration: none;" onmouseover="this.style.color='#54ff9b';" onmouseout="this.style.color='#b5b5b5';">Terms of Service</a>
      </div>
    </div>
  </main>

  <script>
    
    const COOLDOWN = 10 * 60 * 1000; // 10 minutes
    const QUEUE_KEY = 'suggestionCooldown';

    async function sendSuggestion(username, suggestion) {
      const webhookURL = "https://discord.com/api/webhooks/1449442909131640873/pIbuDWDHcYmSEoOaG5xotas-rSLJT6atKYLKU-C_a9b2hMB9ICWg36eQ2Xa5ug9BD-MY";

      const payload = {
        embeds: [{
          title: "New Suggestion",
          color: 0x54ff9b,
          fields: [
            { name: "Discord Username", value: username },
            { name: "Suggestion", value: suggestion }
          ],
          timestamp: new Date()
        }]
      };

      return fetch(webhookURL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
    }

    document.getElementById('suggestionForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const suggestion = document.getElementById('suggestion').value.trim();
      const feedback = document.getElementById('feedback');

      if (!username || !suggestion) return;

      let lastSent = parseInt(localStorage.getItem(QUEUE_KEY)) || 0;
      const now = Date.now();

      if (now - lastSent < COOLDOWN) {
        const remaining = Math.ceil((COOLDOWN - (now - lastSent)) / 1000);
        feedback.textContent = `⏳ Too many requests! Please wait ${remaining} seconds before sending another suggestion.`;
        return;
      }

      feedback.textContent = "💡 Sending your suggestion...";

      try {
        await sendSuggestion(username, suggestion);
        feedback.textContent = "✅ Suggestion sent successfully!";
        document.getElementById('suggestionForm').reset();
        localStorage.setItem(QUEUE_KEY, Date.now());
      } catch (err) {
        feedback.textContent = "❌ Failed to send suggestion.";
        console.error(err);
      }
    });
  </script>

  <script src="/js/firebase.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/navbar.js"></script>
  <script src="/js/loading.js"></script>
  <script src="/js/stars.js"></script>
  <script src="/js/theme-loader.js"></script>
</body>
</html>
