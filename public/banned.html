<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Banned</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: 
        linear-gradient(135deg, rgba(15, 23, 42, 0.85) 0%, rgba(30, 41, 59, 0.75) 100%),
        linear-gradient(to bottom, #0f172a, #1e293b);
      background-color: #0f172a;
      padding: 20px;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(2px);
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes modalSlideIn {
      from {
        opacity: 0;
        transform: scale(0.95) translateY(-10px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @keyframes contentFadeIn {
      from {
        opacity: 0;
        transform: translateY(5px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal {
      position: relative;
      z-index: 10;
      background: #1a2744;
      border-radius: 6px;
      padding: 24px 28px;
      max-width: 400px;
      width: 100%;
      box-shadow: 
        0 0 0 1px rgba(255, 255, 255, 0.05),
        0 25px 50px -12px rgba(0, 0, 0, 0.6);
      animation: modalSlideIn 0.4s ease-out;
    }

    .modal-title {
      color: #ffffff;
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 10px;
      letter-spacing: -0.01em;
      animation: contentFadeIn 0.4s ease-out 0.1s both;
    }

    .modal-description {
      color: #94a3b8;
      font-size: 13px;
      line-height: 1.55;
      margin-bottom: 14px;
      animation: contentFadeIn 0.4s ease-out 0.15s both;
    }

    .modal-description a {
      color: #60a5fa;
      text-decoration: none;
      transition: color 0.2s;
    }

    .modal-description a:hover {
      color: #93c5fd;
      text-decoration: underline;
    }

    .error-code {
      color: #ffffff;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 18px;
      animation: contentFadeIn 0.4s ease-out 0.2s both;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      animation: contentFadeIn 0.4s ease-out 0.25s both;
    }

    .btn-ok {
      background: #3b82f6;
      color: #ffffff;
      border: none;
      border-radius: 4px;
      padding: 7px 18px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-ok:hover {
      background: #2563eb;
      transform: translateY(-1px);
    }

    .btn-ok:active {
      background: #1d4ed8;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="overlay"></div>

  <div class="modal">
    <h1 class="modal-title">
      Your account has been banned.
    </h1>

    <p class="modal-description">
      Your account has been temporarily banned from accessing global chat or settings.
      You'll regain access when the ban ends. To appeal, check your 
      <a href="bannedhistory.html">ban history</a> or 
      <a href="appeal.html">appeal here</a>.
    </p>

    <p class="error-code">Error code: EC:10902</p>

    <div class="modal-footer">
      <button class="btn-ok" onclick="window.location.href='/'">Ok</button>
    </div>
  </div>

  <!-- Your scripts -->
  <script src="/js/firebase.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/navbar.js"></script>
  <script src="/js/settings.js"></script>
  <script src="/js/loading.js"></script>
  <script src="/js/stars.js"></script>
  <script src="/js/theme-loader.js"></script>
</body>

</html>
